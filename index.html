<!DOCTYPE html><html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNEB Bill Calculator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
      display: flex;
      justify-content: center;
      padding: 30px 15px;
    }.container {
  width: 100%;
  max-width: 600px;
  background: white;
  border-radius: 18px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  margin-top: 0;
  font-size: 28px;
  color: #0f172a;
}

.subtitle {
  text-align: center;
  color: #555;
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #d0d7e2;
  font-size: 18px;
  box-sizing: border-box;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 18px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #1d4ed8;
}

.result {
  margin-top: 25px;
  background: #f8fafc;
  border-radius: 14px;
  padding: 20px;
  border: 1px solid #e2e8f0;
}

.bill {
  font-size: 32px;
  font-weight: bold;
  color: #16a34a;
  margin-top: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px dashed #ddd;
}

.row:last-child {
  border-bottom: none;
}

.stamp {
  margin-top: 20px;
  text-align: center;
  border: 3px dashed red;
  color: red;
  padding: 12px;
  border-radius: 12px;
  font-size: 22px;
  font-weight: bold;
  transform: rotate(-3deg);
}

.note {
  margin-top: 15px;
  font-size: 14px;
  color: #666;
  text-align: center;
}

  </style>
</head>
<body>
  <div class="container">
    <h1>தமிழ்நாடு EB Bill Calculator</h1>
    <div class="subtitle">500 யூனிட் கீழ் Subsidy Slab Calculation</div><input type="number" id="units" placeholder="எத்தனை units?" />
<button onclick="calculateBill()">கணக்கிடு</button>

<div class="result" id="result" style="display:none;">
  <div id="breakdown"></div>

  <div class="bill" id="total"></div>

  <div class="stamp" id="savingStamp"></div>

  <div class="note">
    * Above 500 units crossed என்றால் ₹2.35 subsidy slab remove ஆகும்.
  </div>
</div>

  </div>  <script>
    function calculateBill() {
      const units = parseInt(document.getElementById('units').value);

      if (!units || units <= 0) {
        alert('Valid units enter செய்யவும்');
        return;
      }

      let total = 0;
      let breakdown = [];

      if (units <= 500) {
        if (units > 100) {
          const slab2 = Math.min(units, 200) - 100;
          total += slab2 * 2.35;
          breakdown.push(`101-200 : ${slab2} × ₹2.35 = ₹${(slab2 * 2.35).toFixed(2)}`);
        }

        if (units > 200) {
          const slab3 = Math.min(units, 400) - 200;
          total += slab3 * 4.7;
          breakdown.push(`201-400 : ${slab3} × ₹4.70 = ₹${(slab3 * 4.7).toFixed(2)}`);
        }

        if (units > 400) {
          const slab4 = units - 400;
          total += slab4 * 6.3;
          breakdown.push(`401-500 : ${slab4} × ₹6.30 = ₹${(slab4 * 6.3).toFixed(2)}`);
        }
      } else {
        const slab2 = 300;
        total += slab2 * 4.7;
        breakdown.push(`101-400 : 300 × ₹4.70 = ₹${(300 * 4.7).toFixed(2)}`);

        const slab3 = 100;
        total += slab3 * 6.3;
        breakdown.push(`401-500 : 100 × ₹6.30 = ₹${(100 * 6.3).toFixed(2)}`);

        if (units > 500) {
          const slab4 = Math.min(units, 600) - 500;
          total += slab4 * 8.4;
          breakdown.push(`501-600 : ${slab4} × ₹8.40 = ₹${(slab4 * 8.4).toFixed(2)}`);
        }

        if (units > 600) {
          const slab5 = Math.min(units, 800) - 600;
          total += slab5 * 9.45;
          breakdown.push(`601-800 : ${slab5} × ₹9.45 = ₹${(slab5 * 9.45).toFixed(2)}`);
        }

        if (units > 800) {
          const slab6 = Math.min(units, 1000) - 800;
          total += slab6 * 10.50;
          breakdown.push(`801-1000 : ${slab6} × ₹10.50 = ₹${(slab6 * 10.50).toFixed(2)}`);
        }

        if (units > 1000) {
          const slab7 = units - 1000;
          total += slab7 * 11.55;
          breakdown.push(`1000+ : ${slab7} × ₹11.55 = ₹${(slab7 * 11.55).toFixed(2)}`);
        }
      }

      const oldSystem = total + 235;
      const saving = oldSystem - total;

      document.getElementById('breakdown').innerHTML = breakdown
        .map(item => `<div class="row"><span>${item}</span></div>`)
        .join('');

      document.getElementById('total').innerHTML = `மொத்த Bill : ₹${Math.round(total)}`;

      if (units <= 500) {
        document.getElementById('savingStamp').innerHTML = `வெறும் ₹${Math.round(saving)} தான் சேமிப்பு`;
      } else {
        document.getElementById('savingStamp').innerHTML = `500 units மேல் subsidy கிடையாது`;
      }

      document.getElementById('result').style.display = 'block';
    }
  </script></body>
</html>
